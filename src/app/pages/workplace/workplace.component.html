<div class="body">
    <div class="row" style="padding-right: 30px;">
        <div class="col-lg-6" style="padding-left: 3%; padding-top: 1%;">
            <h3>My Library</h3>
            <p style="color: #7a7a7a;">Explore and manage your library</p>
        </div>
        <div class="col-lg-6" style="padding-top: 1.5%;">
            <div class="search-actions">
                <div class="search-container">

                    <i class="uil uil-search search-icon"></i>

                    <input type="text" class="search-input" placeholder="Search..." [(ngModel)]="searchText"
                        (input)="filterSearch()">

                </div>

                <button (click)="dateView()" class="action-button" [class.active]="isDateView === true"><i
                        class="uil uil-schedule"></i> </button>
                <button (click)="openSettingsSidebar()" class="action-button"><i class="uil uil-filter"></i> </button>
            </div>
        </div>
    </div>

    <header>
        <div class="row">
            <div class="filter-container">
                <div class="filter-options">
                    <button class="filter-button" (click)="loadData('Animes')"
                        [class.active]="selectedItem === 'Animes'"><i class="uil"><img src="assets/img/Icons/anime.png"
                                class="icon">Animes</i></button>
                    <button class="filter-button" (click)="loadData('Movies')"
                        [class.active]="selectedItem === 'Movies'"><i class="uil"><img src="assets/img/Icons/movie.png"
                                class="icon">Movies</i></button>
                    <button class="filter-button" (click)="loadData('Series')"
                        [class.active]="selectedItem === 'Series'"><i class="uil"><img src="assets/img/Icons/show.png"
                                class="icon">Shows</i></button>
                    <button class="filter-button" (click)="loadData('Books')"
                        [class.active]="selectedItem === 'Books'"><i class="uil"><img src="assets/img/Icons/book.png"
                                class="icon">Books</i></button>
                    <button class="filter-button" (click)="loadData('Games')"
                        [class.active]="selectedItem === 'Games'"><i class="uil"><img src="assets/img/Icons/game.png"
                                class="icon">Games</i></button>
                    <button class="filter-button" (click)="loadData('Music')"
                        [class.active]="selectedItem === 'Music'"><i class="uil"><img src="assets/img/Icons/music.png"
                                class="icon">Music</i></button>



                    <div class="header-actions">
                        <select class="sort-select" [(ngModel)]="sortOption" (change)="changeSort()">
                            <option value="recent">
                                Most Recent
                            </option>
                            <option value="highScore">
                                Highest Rated
                            </option>
                            <option value="lowScore">
                                Lowest Rated
                            </option>
                        </select>


                        <!-- <button (click)="openSettingsSidebar()" class="filter-button">
                            <i class="uil uil-setting"></i>
                        </button>-->
                    </div>
                    <!--<button (click)="actualizarTodo()" >todo</button>-->

                </div>
            </div>
        </div>
    </header>


    <div *ngIf="!isDateView" class="list">
        <div class="gallery-container">
            <div class="movie-card" *ngFor="let movie of resultFilter">
                <div class="cardImage">

                    <div *ngIf="selectedItem !== 'Music'">
                        <img (click)="openModal(movie)" class="image ${getScoreClass(movie.score)}"
                            title="{{ movie.name }}" [src]="movie.image" [alt]="movie.name" />

                    </div>
                    <div *ngIf="selectedItem === 'Music'">
                        <img (click)="openModal(movie)" class="imageMusic" title="{{ movie.name }}" [src]="movie.image"
                            [alt]="movie.name" />
                    </div>

                </div>



                <div class="stars">
                    <ng-container *ngFor="let star of [1, 2, 3, 4, 5]; let i = index">
                        <i class="star" [ngClass]="{'filled': i < movie.score}" aria-hidden="true">★</i>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>

    <div *ngIf="isDateView" class="list">
        <div *ngFor="let item of months; let i = index">

            <div style=" padding-left: 2%;">
                <p>-- {{item.name}} --</p>
            </div>

            <div class="gallery-container">
                <div class="movie-card" *ngFor="let movie of dataFilterByDate(resultFilter, item.number)">
                    <div class="cardImage">

                        <div *ngIf="selectedItem !== 'Music'">
                            <img (click)="openModal(movie)" class="image ${getScoreClass(movie.score)}"
                                title="{{ movie.name }}" [src]="movie.image" [alt]="movie.name" />

                        </div>
                        <div *ngIf="selectedItem === 'Music'">
                            <img (click)="openModal(movie)" class="imageMusic" title="{{ movie.name }}"
                                [src]="movie.image" [alt]="movie.name" />
                        </div>

                    </div>



                    <div class="stars">
                        <ng-container *ngFor="let star of [1, 2, 3, 4, 5]; let i = index">
                            <i class="star" [ngClass]="{'filled': i < movie.score}" aria-hidden="true">★</i>
                        </ng-container>
                    </div>
                </div>
            </div>
        </div>

    </div>


    <div class="row " style="height: 30px;">
        <div class="col-lg-2" style="padding-left: 3%;">
            <p style=" margin-top: 2.5%;">
                <i class="uil uil-info-circle"></i>
                Total: {{ resultCount }}
            </p>
        </div>

        <div class="col-lg-10" *ngIf="isbarraShow === true" style=" margin-top: 0.7%;">
            <div class="progress-container">
                <div class="progress-bar" [style.width.%]="percentage">
                    {{ goalActualYear }} / {{ goalAmount }}
                    ( {{ percentage | number:'1.0-0' }}% )
                </div>
            </div>
        </div>
    </div>


    <div class="loading-overlay" *ngIf="loading">
        <div class="loading-spinner"></div>
    </div>

    <div class="sidebar-overlay" *ngIf="isSidebarOpen" (click)="closeSettingsSidebar()">
    </div>

    <!-- Sidebar -->
    <div class="settings-sidebar" [class.open]="isSidebarOpen">

        <div class="sidebar-header">
            <h3>Filtros</h3>

            <button class="close-btn" (click)="closeSettingsSidebar()">

                <i class="uil uil-times"></i>

            </button>
        </div>

        <div class="sidebar-content">

            <div class="filter-group">

                <label>Categoría</label>

                <select [(ngModel)]="selectedCategory" (change)="filterType($event)">

                    <option value="Todos">
                        Todos
                    </option>

                    <option *ngFor="let opcion of categories" [value]="opcion.id">

                        {{ opcion.name }}

                    </option>

                </select>

            </div>

            <div class="filter-group">

                <label>Año</label>

                <select [(ngModel)]="selectedYear" (change)="filterYear($event)">

                    <option *ngFor="let opcion of opAnios" [value]="opcion">

                        {{ opcion }}

                    </option>

                </select>

            </div>

            <div class="filter-group">

                <label>Calificación</label>

                <select [(ngModel)]="selectedScore" (change)="filterScore($event)">

                    <option value="Todos">
                        Todos
                    </option>

                    <option *ngFor="let opcion of opCalificacion" [value]="opcion">

                        {{ opcion }}

                    </option>

                </select>

            </div>

            <div class="filter-group" *ngIf="selectedItem === 'Books'">

                <label>Tipo de Libro</label>

                <select (change)="filterKind($event)">

                    <option value="Todos">
                        Todos
                    </option>

                    <option *ngFor="let opcion of opKind" [value]="opcion">

                        {{ opcion }}

                    </option>

                </select>

            </div>

            <!-- <div class="filter-group">

                <button class="sidebar-button" (click)="sortDataByScore()">

                    <i [ngClass]="{
                    'uil uil-sort-amount-up': currentSortOrder === 'asc',
                    'uil uil-sort-amount-down': currentSortOrder === 'desc'
                }">
                    </i>

                    Ordenar por Score

                </button>

            </div>

             <div class="filter-group">

                <button class="sidebar-button" (click)="dateView()">

                    <i class="uil uil-calendar-alt"></i>

                    Vista por Fecha

                </button>

            </div>-->

            <div class="filter-group" *ngIf="selectedItem !== 'Books'">

                <button class="sidebar-button" (click)="watchActualRelease()">

                    Release Actual

                </button>

                <button class="sidebar-button" (click)="showBar()">
                    Show Bar
                </button>

            </div>

            <!--   <div class="filter-group">

                <button class="sidebar-button">

                    Total: {{ resultCount }}

                </button>

            </div>-->

        </div>

    </div>

</div>
