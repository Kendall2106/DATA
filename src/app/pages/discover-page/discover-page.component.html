<div class="body">
  <nav class="navbar navbar-expand-sm " >
    <div class="container">
      <a class="navbar-brand" href="#">{{this.message}}</a>
      <button class="navbar-toggler" type="button" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation" (click)="toggleNavbar()">
        <span class="navbar-toggler-icon"></span>
      </button>
  
      <div class="collapse navbar-collapse justify-content-end" [ngClass]="{ 'show': navbarOpen }" id="navbarContent">
        
        <ul class="navbar-nav ml-auto">
          
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="loadData('Animes');" [class.active]="selectedItem === 'Animes'"><img src="assets/img/Icons/anime.png" class="icon"> Animes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="loadData('Movies');" [class.active]="selectedItem === 'Movies'"><img src="assets/img/Icons/movie.png" class="icon"> Movies</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="loadData('Series')" [class.active]="selectedItem === 'Series'" ><img src="assets/img/Icons/show.png" class="icon"> Shows</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="loadData('Books');" [class.active]="selectedItem === 'Books'"><img src="assets/img/Icons/book.png" class="icon"> Books</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="loadData('Games');" [class.active]="selectedItem === 'Games'"><img src="assets/img/Icons/game.png" class="icon"> Games</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" (click)="loadData('Music');" [class.active]="selectedItem === 'Music'"><img src="assets/img/Icons/music.png" class="icon"> Music</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="intro" *ngIf="introVisible">
    <h1>TIME</h1>
    <h1>CAPSULE</h1>
    <h3>2019-{{actualYear}}</h3>
    <p>"I want to be free, but I dont know who I am without the walls around me." - Evangelion</p>
</div>
  

  <div class="container list col-lg-12">
    <div *ngIf="showAnimeList">
      <app-anime-list-discover></app-anime-list-discover>
    </div>
    <div *ngIf="showMovieList">
      <app-movie-list-discover></app-movie-list-discover>
    </div>
    <div *ngIf="showSeriesList">
      <app-serie-list-discover></app-serie-list-discover>
    </div>
    <div *ngIf="showGameList">
      <app-game-list-discover></app-game-list-discover>
    </div>
    <div *ngIf="showBookList">
      <app-book-list-discover></app-book-list-discover>
    </div>
    <div *ngIf="showMusicList">
      <app-music-list-discover></app-music-list-discover>
    </div>
  </div>
