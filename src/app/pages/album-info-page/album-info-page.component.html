

<div class="body">


<div class="row" style="padding-right: 30px;">
        <div class="col-lg-8" style="padding-left: 3%; padding-top: 1%;">
            <h3>Top 50 mejores Isekai</h3>
        </div>
        <div class="col-lg-4" style="padding-left: 3%; padding-top: 1%; text-align: right;">
            <h3>{{ watchedCount }} / {{ totalAlbums }}</h3>
        </div>
    </div>






    <div class="mainData">


        <div class="gallery-container">


            <div class="movie-card" *ngFor="let movie of resultFilter">
                <div class="cardImage">
                        <img class="image" title="{{ movie.name }}"[class.grayscale]="!movie.watched"  [src]="movie.image" [alt]="movie.name" />
                </div>

                <button  class="delete-button" (click)="watch(movie.id)">
                    <i class="uil uil-eye"></i>
                </button>

                <div class="stars">
                    <p class="title">{{movie.name}}</p>
                </div>
            </div>
        </div>




    </div>







    <div class="loading-overlay" *ngIf="loading">
        <div class="loading-spinner"></div>
    </div>

</div>
